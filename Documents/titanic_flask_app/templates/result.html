<!DOCTYPE html>
<html>

<head>

    <title>Prediction Result</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container result-container">

        <h1>{{ result }}</h1>

        <h2>{{ confidence }}%</h2>

        <p>{{ message }}</p>

        <a href="/">

            <button>
                Predict Again
            </button>

        </a>

    </div>

</body>

</html>
