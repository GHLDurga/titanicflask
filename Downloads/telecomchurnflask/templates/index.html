<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecom Churn Prediction</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        form {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 6px;
        }

        input,
        select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        button {
            grid-column: span 3;
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 25px;
            text-align: center;
            font-size: 24px;
            color: green;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            form {
                grid-template-columns: 1fr;
            }

            button {
                grid-column: span 1;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Telecom Churn Prediction</h1>

    <form action="/predict" method="POST">

        <!-- Customer Details -->

        <div class="field">
            <label>Gender</label>
            <select name="Gender" required>
                <option value="0">Female</option>
                <option value="1">Male</option>
            </select>
        </div>

        <div class="field">
            <label>Age</label>
            <input type="number" name="Age" required>
        </div>

        <div class="field">
            <label>Married</label>
            <select name="Married" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Number of Dependents</label>
            <input type="number" name="Number of Dependents" required>
        </div>

        <div class="field">
            <label>Latitude</label>
            <input type="number" step="any" name="Latitude" required>
        </div>

        <div class="field">
            <label>Longitude</label>
            <input type="number" step="any" name="Longitude" required>
        </div>

        <div class="field">
            <label>Number of Referrals</label>
            <input type="number" name="Number of Referrals" required>
        </div>

        <div class="field">
            <label>Tenure in Months</label>
            <input type="number" name="Tenure in Months" required>
        </div>

        <div class="field">
            <label>Phone Service</label>
            <select name="Phone Service" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Avg Monthly Long Distance Charges</label>
            <input type="number" step="any" name="Avg Monthly Long Distance Charges" required>
        </div>

        <div class="field">
            <label>Multiple Lines</label>
            <select name="Multiple Lines" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Internet Service</label>
            <select name="Internet Service" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Avg Monthly GB Download</label>
            <input type="number" step="any" name="Avg Monthly GB Download" required>
        </div>

        <!-- Services -->

        <div class="field">
            <label>Online Security</label>
            <select name="Online Security" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Online Backup</label>
            <select name="Online Backup" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Device Protection Plan</label>
            <select name="Device Protection Plan" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Premium Tech Support</label>
            <select name="Premium Tech Support" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Streaming TV</label>
            <select name="Streaming TV" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Streaming Movies</label>
            <select name="Streaming Movies" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Streaming Music</label>
            <select name="Streaming Music" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Unlimited Data</label>
            <select name="Unlimited Data" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Paperless Billing</label>
            <select name="Paperless Billing" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <!-- Billing -->

        <div class="field">
            <label>Monthly Charge</label>
            <input type="number" step="any" name="Monthly Charge" required>
        </div>

        <div class="field">
            <label>Total Charges</label>
            <input type="number" step="any" name="Total Charges" required>
        </div>

        <div class="field">
            <label>Total Refunds</label>
            <input type="number" step="any" name="Total Refunds" required>
        </div>

        <div class="field">
            <label>Total Extra Data Charges</label>
            <input type="number" step="any" name="Total Extra Data Charges" required>
        </div>

        <div class="field">
            <label>Total Long Distance Charges</label>
            <input type="number" step="any" name="Total Long Distance Charges" required>
        </div>

        <div class="field">
            <label>Total Revenue</label>
            <input type="number" step="any" name="Total Revenue" required>
        </div>

        <!-- Internet Type -->

        <div class="field">
            <label>Internet Type</label>
            <select name="internet_type" required>
                <option value="Cable">Cable</option>
                <option value="DSL">DSL</option>
                <option value="Fiber Optic">Fiber Optic</option>
            </select>
        </div>

        <!-- Contract -->

        <div class="field">
            <label>Contract Type</label>
            <select name="contract_type" required>
                <option value="Month-to-Month">Month-to-Month</option>
                <option value="One Year">One Year</option>
                <option value="Two Year">Two Year</option>
            </select>
        </div>

        <!-- Payment -->

        <div class="field">
            <label>Payment Method</label>
            <select name="payment_method" required>
                <option value="Bank Withdrawal">Bank Withdrawal</option>
                <option value="Credit Card">Credit Card</option>
                <option value="Mailed Check">Mailed Check</option>
            </select>
        </div>

        <!-- Engineered Feature -->

        <div class="field">
            <label>Average Monthly Spend</label>
            <input type="number" step="any" name="avg_monthly_spend" required>
        </div>

        <div class="field">
            <label>Spend Change</label>
            <input type="number" step="any" name="spend_change" required>
        </div>

        <!-- Automatically calculated -->

        <div class="field">
            <label>High Bill</label>
            <select name="high_bill" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Age Group (Senior)</label>
            <select name="age_group_Senior" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="field">
            <label>Age Group (Young)</label>
            <select name="age_group_Young" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <button type="submit">Predict Churn</button>

    </form>

    {% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
    {% endif %}

</div>

</body>
</html>
